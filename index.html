<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Lavagna Asta Fantacalcio</title>

<!-- Font: Oswald per i titoli (stile numero di maglia), Inter per il corpo testo, Roboto Mono per i numeri -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />

<!-- React + ReactDOM (UMD, no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel Standalone: trasforma il JSX direttamente nel browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (compat SDK, il più semplice da usare senza bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="root">
  <div class="boot-loader">Caricamento lavagna asta…</div>
</div>

<!-- La configurazione Firebase va inserita qui (vedi README.md) -->
<script src="firebase-config.js"></script>

<!-- App React (JSX trasformato al volo da Babel) -->
<script type="text/babel" data-presets="react" src="app.js"></script>

</body>
</html>
